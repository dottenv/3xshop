<table class="flat-table">
  <tbody>
    {% for transaction in transactions %}
    <tr>
      <td>{{ transaction.user_id or '—' }}</td>
      <td>{{ transaction.host_name or '—' }}</td>
      <td>{{ transaction.plan_name or '—' }}</td>
      <td>{{ transaction.amount or 0 }}₽</td>
      <td>{{ transaction.created_date or '—' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
