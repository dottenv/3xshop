<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Панель управления{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    
    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Flat Admin Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flat.css') }}">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block head %}{% endblock %}
</head>
<body data-page="{{ request.endpoint }}" class="app-body">
    <div class="app-shell">
        <!-- Sidebar -->
        {% include 'Flat/partials/sidebar.html' %}
        
        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            {% include 'Flat/partials/header.html' %}
            
            <!-- Main Content Area (SPA Container) -->
            <main class="main-content" id="app-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container" style="position: fixed; top: 1rem; right: 1rem; z-index: 1000;"></div>
    
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <script id="flash-messages" type="application/json">{{ messages|tojson }}</script>
        {% endif %}
    {% endwith %}
    
    <!-- Core JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
    
    <!-- Flat Theme JavaScript -->
    <script>
        // Flat Theme Specific JavaScript
        (function() {
            'use strict';
            
            // Mobile Sidebar Toggle
            const sidebarToggle = document.getElementById('sidebar-toggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                    
                    // Create/Remove overlay
                    let overlay = document.querySelector('.sidebar-overlay');
                    if (sidebar.classList.contains('open')) {
                        if (!overlay) {
                            overlay = document.createElement('div');
                            overlay.className = 'sidebar-overlay';
                            document.body.appendChild(overlay);
                            
                            overlay.addEventListener('click', function() {
                                sidebar.classList.remove('open');
                                overlay.classList.remove('active');
                            });
                        }
                        overlay.classList.add('active');
                    } else if (overlay) {
                        overlay.classList.remove('active');
                    }
                });
            }
            
            // Toast Notifications
            window.showToast = function(message, type = 'info', duration = 4000) {
                const container = document.getElementById('toast-container');
                if (!container) return;
                
                const toast = document.createElement('div');
                toast.className = `alert alert-${type}`;
                toast.style.cssText = `
                    margin-bottom: 0.5rem;
                    animation: slideIn 0.3s ease;
                    cursor: pointer;
                `;
                toast.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${type === 'success' ? '<polyline points="20,6 9,17 4,12"></polyline>' : 
                          type === 'danger' ? '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>' :
                          '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>'}
                    </svg>
                    <span>${message}</span>
                `;
                
                container.appendChild(toast);
                
                // Auto remove
                setTimeout(() => {
                    toast.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
                
                // Click to dismiss
                toast.addEventListener('click', () => toast.remove());
            };
            
            // Process flash messages
            const flashData = document.getElementById('flash-messages');
            if (flashData) {
                try {
                    const messages = JSON.parse(flashData.textContent);
                    messages.forEach(function(item) {
                        const category = item[0];
                        const message = item[1];
                        window.showToast(message, category === 'danger' ? 'danger' : category);
                    });
                } catch(e) {}
            }
            
            // SPA Navigation (prepared for future implementation)
            window.navigateTo = function(url, pushState = true) {
                // This function will be extended for full SPA behavior
                if (pushState) {
                    history.pushState({}, '', url);
                }
                // For now, just navigate normally
                window.location.href = url;
            };
            
            // Add fadeOut animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeOut {
                    from { opacity: 1; transform: translateX(0); }
                    to { opacity: 0; transform: translateX(100%); }
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
