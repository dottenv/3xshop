<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Вход в панель управления</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='css/tabler.css') }}">
		<link rel="stylesheet" href="{{ url_for('static', filename='css/tabler-icons.css') }}">
		<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
		<style>
			body {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			}
			
			.login-container {
				background: white;
				padding: 2rem;
				border-radius: 12px;
				box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
				width: 100%;
				max-width: 400px;
			}
			
			.login-header {
				text-align: center;
				margin-bottom: 2rem;
			}
			
			.login-header h1 {
				color: #333;
				font-size: 1.5rem;
				font-weight: 600;
				margin: 0;
			}
			
			.login-header p {
				color: #666;
				margin: 0.5rem 0 0 0 0;
				font-size: 0.9rem;
			}
			
			.form-floating {
				margin-bottom: 1.5rem;
			}
			
			.form-control {
				border: 2px solid #e1e5e9;
				border-radius: 8px;
				padding: 0.75rem 1rem;
				font-size: 1rem;
				transition: all 0.2s ease;
			}
			
			.form-control:focus {
				border-color: #667eea;
				box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
			}
			
			.btn {
				border-radius: 8px;
				padding: 0.75rem 1.5rem;
				font-weight: 500;
				transition: all 0.2s ease;
			}
			
			.btn-primary {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				border: none;
				color: white;
			}
			
			.btn-primary:hover {
				transform: translateY(-1px);
				box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
			}
			
			.alert {
				border-radius: 8px;
				border: none;
				font-weight: 500;
			}
			
			.alert-danger {
				background: #fee;
				color: #c53030;
			}
			
			.form-check {
				margin-bottom: 1rem;
			}
			
			.form-check-input:checked {
				background-color: #667eea;
				border-color: #667eea;
			}
		</style>
	</head>
	<body>
		<div class="login-container">
			<div class="login-header">
				<h1>Панель управления</h1>
				<p>Введите ваши учетные данные для входа</p>
			</div>
			
			{% with messages = get_flashed_messages(with_categories=true) %}
				{% if messages %}
					{% for category, message in messages %}
						<div class="alert alert-{{ category }} alert-dismissible" role="alert">
							{{ message }}
							<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
						</div>
					{% endfor %}
				{% endif %}
			{% endwith %}
			
			<form method="post">
				<div class="form-floating">
					<input type="text" class="form-control" id="username" name="username" placeholder="Логин" required autofocus>
					<label for="username">Логин</label>
				</div>
				
				<div class="form-floating">
					<input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
					<label for="password">Пароль</label>
				</div>
				
				<div class="form-check">
					<input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
					<label class="form-check-label" for="remember_me">Запомнить меня</label>
				</div>
				
				<button type="submit" class="btn btn-primary w-100">Войти</button>
			</form>
		</div>
		
		<script src="{{ url_for('static', filename='js/tabler.min.js') }}"></script>
	</body>
</html>
