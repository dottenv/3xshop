<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-primary text-white avatar">
            <i class="fas fa-users"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-medium">
            {{ stats.user_count }}
          </div>
          <div class="text-secondary small">
            Пользователей
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-green text-white avatar">
            <i class="fas fa-key"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-medium">
            {{ stats.total_keys }}
          </div>
          <div class="text-secondary small">
            Всего ключей
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-yellow text-white avatar">
            <i class="fas fa-wallet"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-medium">
            {{ stats.total_spent | round(2) }} <small class="text-secondary">RUB</small>
          </div>
          <div class="text-secondary small">
            Всего потрачено
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-sm-6 col-lg-3">
  <div class="card card-sm">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="bg-blue text-white avatar">
            <i class="fas fa-server"></i>
          </span>
        </div>
        <div class="col">
          <div class="font-weight-medium">
            {{ stats.host_count }}
          </div>
          <div class="text-secondary small">
            Хосты • {{ open_tickets_count }} тикетов
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
