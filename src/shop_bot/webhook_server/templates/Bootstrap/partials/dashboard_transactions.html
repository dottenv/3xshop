{% for tx in transactions %}
<tr>
    <td class="py-1">
        <div class="d-flex align-items-center">
            <div class="flex-grow-1">
                <div class="fw-semibold text-truncate" style="max-width: 140px;" title="{{ tx.username or 'N/A' }}">
                    {{ tx.username or 'N/A' }}
                </div>
                <div class="text-muted small text-truncate" style="max-width: 140px;">
                    {{ tx.user_id }}
                </div>
            </div>
        </div>
    </td>
    <td class="py-1 text-center">
        <span class="badge bg-primary-subtle text-primary fw-medium">
            {{ tx.plan_name }}
        </span>
    </td>
    <td class="py-1">
        <div class="fw-bold text-nowrap">
            {{ tx.amount_rub | round(1) }} <small>₽</small>
        </div>
    </td>
    <td class="py-1">
        <div class="text-muted small">
            {{ tx.created_date.split(' ')[0] }}
        </div>
    </td>
</tr>
{% endfor %}
