<div class="row row-deck">
    <div class="col-md-6 col-lg-3">
        <div class="card stat-card">
            <div class="font-weight-bold h1 mb-0">
            {{ stats.user_count }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Пользователей
          </div>
            <i class="bi bi-people stat-icon"></i>
        </div>
    </div>
    <div class="col-md-6 col-lg-3">
        <div class="card stat-card">
            <div class="font-weight-bold h1 mb-0">
            {{ stats.total_keys }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Всего ключей
          </div>
            <i class="bi bi-key stat-icon"></i>
        </div>
    </div>
    <div class="col-md-6 col-lg-3">
        <div class="card stat-card">
            <div class="font-weight-bold h1 mb-0">
            {{ stats.total_spent | round(1) }} <small class="fs-4 fw-normal">₽</small>
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            Потрачено
          </div>
            <i class="bi bi-currency-exchange stat-icon"></i>
        </div>
    </div>
    <div class="col-md-6 col-lg-3">
        <div class="card stat-card">
            <div class="font-weight-bold h1 mb-0">
            {{ stats.host_count }}
          </div>
          <div class="text-muted small text-uppercase fw-bold">
            {{ open_tickets_count }} тикетов
          </div>
            <i class="bi bi-headset stat-icon"></i>
        </div>
    </div>
</div>
